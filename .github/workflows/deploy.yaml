name: Deploy to Namecheap Node Hosting

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e

            cd ~/domains/server.myassetstracker.live

            echo "Activating Node environment..."
            source /home/myasezip/nodevenv/domains/server.myassetstracker.live/22/bin/activate

            echo "Pulling latest code..."
            git pull origin main

            echo "Installing dependencies..."
            npm install

            echo "Building app..."
            npm run build

            echo "Generating Swagger docs..."
            npm run swagger

            echo "Running database migrations..."
            npm run db:push

            echo "Restarting Passenger app..."
            mkdir -p tmp
            touch tmp/restart.txt

            echo "Deployment successful!"
